name: Build OpenClash

on:
  workflow_dispatch:
  push:
    branches:
      - master
      - main
    paths:
      - 'luci-app-openclash/**'
      - '.github/workflows/build-openclash.yml'

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: aarch64_generic
            sdk_target: armsr-armv8
            sdk_url: https://downloads.openwrt.org/releases/24.10.5/targets/armsr/armv8/openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst
            sdk_archive: openwrt-sdk-24.10.5-armsr-armv8_gcc-13.3.0_musl.Linux-x86_64.tar.zst

    env:
      PACKAGE_NAME: luci-app-openclash

    steps:
      - name: Checkout source
        uses: actions/checkout@v5

      - name: Read package version
        run: |
          PKG_VERSION=$(sed -n 's/^PKG_VERSION:=//p' luci-app-openclash/Makefile | head -n1 | tr -d '[:space:]')
          if [ -z "$PKG_VERSION" ]; then
            echo "PKG_VERSION not found in luci-app-openclash/Makefile"
            exit 1
          fi

          echo "PKG_VERSION=$PKG_VERSION" >> "$GITHUB_ENV"
          echo "IPK_NAME=luci-app-openclash_${PKG_VERSION}_all.ipk" >> "$GITHUB_ENV"

          echo "Using PKG_VERSION=$PKG_VERSION"

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential clang flex bison g++ gawk gcc-multilib g++-multilib \
            gettext git libncurses5-dev libssl-dev rsync unzip zlib1g-dev \
            file wget subversion swig time tar zstd python3 python3-pip python3-setuptools curl

      - name: Cache SDK archive
        uses: actions/cache@v4
        with:
          path: ${{ matrix.sdk_archive }}
          key: sdk-${{ matrix.sdk_target }}-${{ matrix.sdk_archive }}

      - name: Download OpenWrt SDK
        run: |
          if [ ! -f "${{ matrix.sdk_archive }}" ]; then
            wget -O "${{ matrix.sdk_archive }}" "${{ matrix.sdk_url }}"
          fi
          ls -lh "${{ matrix.sdk_archive }}"

      - name: Extract OpenWrt SDK
        run: |
          find . -maxdepth 1 -type d -name 'openwrt-sdk-*' -exec rm -rf {} +
          tar --use-compress-program=unzstd -xf "${{ matrix.sdk_archive }}"
          SDK_DIR=$(find . -maxdepth 1 -type d -name "openwrt-sdk-*" | head -n 1)

          if [ -z "$SDK_DIR" ]; then
            echo "SDK_DIR not found after extraction"
            exit 1
          fi

          echo "SDK_DIR=$SDK_DIR" >> "$GITHUB_ENV"
          echo "Using SDK_DIR=$SDK_DIR"

      - name: Prepare custom feed package
        run: |
          mkdir -p "$SDK_DIR/package/custom"
          rm -rf "$SDK_DIR/package/custom/luci-app-openclash"
          cp -r "$GITHUB_WORKSPACE/luci-app-openclash" "$SDK_DIR/package/custom/luci-app-openclash"

      - name: Build and install po2lmo
        run: |
          set -eux

          PO2LMO_DIR="$SDK_DIR/package/custom/luci-app-openclash/tools/po2lmo"

          if [ ! -d "$PO2LMO_DIR" ]; then
            echo "po2lmo source dir not found: $PO2LMO_DIR"
            exit 1
          fi

          make -C "$PO2LMO_DIR"

          mkdir -p "$SDK_DIR/staging_dir/host/bin"

          if [ -f "$PO2LMO_DIR/src/po2lmo" ]; then
            install -m0755 "$PO2LMO_DIR/src/po2lmo" "$SDK_DIR/staging_dir/host/bin/po2lmo"
          elif [ -f "$PO2LMO_DIR/po2lmo" ]; then
            install -m0755 "$PO2LMO_DIR/po2lmo" "$SDK_DIR/staging_dir/host/bin/po2lmo"
          else
            echo "Built po2lmo binary not found"
            find "$PO2LMO_DIR" -maxdepth 3 -type f
            exit 1
          fi

          "$SDK_DIR/staging_dir/host/bin/po2lmo" --help || true
        
      - name: Update feeds
        working-directory: ${{ env.SDK_DIR }}
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install luci

      - name: Generate config
        working-directory: ${{ env.SDK_DIR }}
        run: |
          echo "CONFIG_PACKAGE_luci-app-openclash=m" >> .config
          make defconfig

      - name: Build package
        working-directory: ${{ env.SDK_DIR }}
        run: |
          export PATH="$PWD/staging_dir/host/bin:$PATH"
          which po2lmo || true
          make package/custom/luci-app-openclash/compile V=s -j"$(nproc)"

      - name: Locate built IPK
        run: |
          IPK_PATH=$(find "$SDK_DIR/bin/packages" -type f -name 'luci-app-openclash_*.ipk' | head -n 1)

          if [ -z "$IPK_PATH" ]; then
            echo "IPK file not found"
            exit 1
          fi

          echo "IPK_PATH=$IPK_PATH" >> "$GITHUB_ENV"
          echo "Using IPK_PATH=$IPK_PATH"
          ls -lh "$IPK_PATH"

      - name: Generate SHA256
        run: |
          sha256sum "$IPK_PATH" | awk '{print $1}' > sha256.txt
          echo "SHA256=$(cat sha256.txt)" >> "$GITHUB_ENV"
          cat sha256.txt

      - name: Upload IPK to API endpoint
        env:
          UPLOAD_URL: ${{ secrets.UPLOAD_URL }}
          UPLOAD_API_KEY: ${{ secrets.UPLOAD_API_KEY }}
        run: |
          CAPTION="$(cat <<EOF
          <b>OpenClash build uploaded</b>
          <b>Mod by:</b> MahaVPN

          <b>● File:</b> $PACKAGE_NAME
          <b>● Version:</b> $PKG_VERSION
          <b>● Repo:</b> ${{ github.repository }}
          <b>● SHA256:</b> <code>$SHA256</code>

          <b>● Archive:</b> <code>$(basename "$IPK_PATH")</code>
          EOF
          )"

          RESPONSE="$(
            curl --fail --show-error --silent \
              -X POST "$UPLOAD_URL" \
              -H "Authorization: Bearer $UPLOAD_API_KEY" \
              -F "file=@$IPK_PATH" \
              -F "category=ipk_mod" \
              -F "subfolder=${{ matrix.arch }}" \
              -F "repository=${{ github.repository }}" \
              -F "sha256=${SHA256}" \
              -F "notify_telegram=1" \
              -F "pkg_name=$PACKAGE_NAME" \
              -F "pkg_version=$PKG_VERSION" \
              -F "arch=${{ matrix.arch }}" \
              -F "mod_name=Afqoro" \
              --form-string "caption=$CAPTION"
          )"

          python3 - <<'PY' "$RESPONSE"
          import json, sys
          data = json.loads(sys.argv[1])
          print(f"{data.get('success')} - {data.get('message')}")
          if data.get("data"):
              import json as _json
              print(_json.dumps(data["data"], indent=2))
          PY

      - name: Upload artifact to GitHub
        uses: actions/upload-artifact@v4
        with:
          name: openclash-${{ matrix.arch }}-${{ env.PKG_VERSION }}
          path: ${{ env.IPK_PATH }}

      - name: Done
        run: echo "Build uploaded successfully"